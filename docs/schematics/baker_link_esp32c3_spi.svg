<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="monospace" font-size="12">
  <title>Baker link.dev (RP2040) ↔ XIAO ESP32-C3 SPI Schematic</title>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <style>
      .chip-box { fill: #f8f8f8; stroke: #333; stroke-width: 2; rx: 6; }
      .chip-label { font-size: 14px; font-weight: bold; text-anchor: middle; }
      .pin-label { font-size: 11px; }
      .pin-left { text-anchor: end; }
      .pin-right { text-anchor: start; }
      .signal-line { stroke-width: 2; fill: none; }
      .spi-line { stroke: #2196F3; }
      .ctrl-line { stroke: #FF9800; }
      .power-line { stroke: #F44336; }
      .gnd-line { stroke: #333; }
      .sensor-box { fill: #E8F5E9; stroke: #4CAF50; stroke-width: 1.5; rx: 4; }
      .motor-box { fill: #FFF3E0; stroke: #FF9800; stroke-width: 1.5; rx: 4; }
      .legend-box { fill: #FAFAFA; stroke: #999; stroke-width: 1; rx: 4; }
      .section-title { font-size: 13px; font-weight: bold; fill: #555; }
      .note-text { font-size: 10px; fill: #777; }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">
    天使の鼻 — Baker link.dev (RP2040) ↔ XIAO ESP32-C3 (esp-hosted) SPI 接続図
  </text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Baker link.dev (RP2040) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect class="chip-box" x="50" y="60" width="340" height="440"/>
  <text class="chip-label" x="220" y="85" fill="#1565C0">Baker link.dev (RP2040)</text>
  <text x="220" y="100" text-anchor="middle" font-size="10" fill="#666">Cortex-M0+ 133MHz • 264KB SRAM</text>

  <!-- SPI0 Pins (right side) -->
  <text class="section-title" x="70" y="130">SPI0 Bus</text>

  <text class="pin-left" x="370" y="155">GP18 (SPI0 SCK)</text>
  <circle cx="380" cy="152" r="4" fill="#2196F3"/>

  <text class="pin-left" x="370" y="180">GP19 (SPI0 MOSI)</text>
  <circle cx="380" cy="177" r="4" fill="#2196F3"/>

  <text class="pin-left" x="370" y="205">GP16 (SPI0 MISO)</text>
  <circle cx="380" cy="202" r="4" fill="#2196F3"/>

  <text class="pin-left" x="370" y="230">GP17 (GPIO out — CS)</text>
  <circle cx="380" cy="227" r="4" fill="#2196F3"/>

  <!-- Control Pins (right side) -->
  <text class="section-title" x="70" y="265">Control Signals</text>

  <text class="pin-left" x="370" y="290">GP15 (GPIO in — HS)</text>
  <circle cx="380" cy="287" r="4" fill="#FF9800"/>

  <text class="pin-left" x="370" y="315">GP13 (GPIO in — DR)</text>
  <circle cx="380" cy="312" r="4" fill="#FF9800"/>

  <text class="pin-left" x="370" y="340">GP14 (GPIO out — RST)</text>
  <circle cx="380" cy="337" r="4" fill="#FF9800"/>

  <!-- Power Pins (right side) -->
  <text class="section-title" x="70" y="375">Power</text>

  <text class="pin-left" x="370" y="400">3V3 OUT</text>
  <circle cx="380" cy="397" r="4" fill="#F44336"/>

  <text class="pin-left" x="370" y="425">GND</text>
  <circle cx="380" cy="422" r="4" fill="#333"/>

  <!-- Sensor/Actuator Pins (left side) -->
  <text class="section-title" x="70" y="455">Sensors &amp; Actuators</text>
  <text class="pin-right" x="70" y="475" font-size="10">GP4/GP5 — I2C0 → BME280</text>
  <text class="pin-right" x="70" y="490" font-size="10">GP26 — ADC0 → MQ-3B</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- XIAO ESP32-C3 -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect class="chip-box" x="610" y="60" width="340" height="440"/>
  <text class="chip-label" x="780" y="85" fill="#E65100">XIAO ESP32-C3</text>
  <text x="780" y="100" text-anchor="middle" font-size="10" fill="#666">esp-hosted-mcu • SPI Slave • WiFi</text>

  <!-- SPI Pins (left side) -->
  <text class="section-title" x="630" y="130">SPI Slave</text>

  <text class="pin-right" x="630" y="155">GPIO6 (D4) — FSPICLK</text>
  <circle cx="620" cy="152" r="4" fill="#2196F3"/>

  <text class="pin-right" x="630" y="180">GPIO7 (D5) — FSPID</text>
  <circle cx="620" cy="177" r="4" fill="#2196F3"/>

  <text class="pin-right" x="630" y="205">GPIO5 (D3) — GPIO Matrix</text>
  <circle cx="620" cy="202" r="4" fill="#2196F3"/>

  <text class="pin-right" x="630" y="230">GPIO10 (D10) — FSPICS0</text>
  <circle cx="620" cy="227" r="4" fill="#2196F3"/>

  <!-- Control Pins (left side) -->
  <text class="section-title" x="630" y="265">Control</text>

  <text class="pin-right" x="630" y="290">GPIO3 (D1) — Handshake</text>
  <circle cx="620" cy="287" r="4" fill="#FF9800"/>

  <text class="pin-right" x="630" y="315">GPIO4 (D2) — Data Ready</text>
  <circle cx="620" cy="312" r="4" fill="#FF9800"/>

  <text class="pin-right" x="630" y="340">GPIO21 (D6) — Reset</text>
  <circle cx="620" cy="337" r="4" fill="#FF9800"/>

  <!-- Power Pins (left side) -->
  <text class="section-title" x="630" y="375">Power</text>

  <text class="pin-right" x="630" y="400">3V3</text>
  <circle cx="620" cy="397" r="4" fill="#F44336"/>

  <text class="pin-right" x="630" y="425">GND</text>
  <circle cx="620" cy="422" r="4" fill="#333"/>

  <!-- WiFi Antenna (right side) -->
  <text class="section-title" x="880" y="130">WiFi</text>
  <text x="880" y="150" font-size="11" fill="#666">802.11</text>
  <text x="880" y="165" font-size="11" fill="#666">b/g/n</text>
  <line x1="930" y1="130" x2="930" y2="100" stroke="#E65100" stroke-width="2"/>
  <line x1="920" y1="105" x2="930" y2="100" stroke="#E65100" stroke-width="2"/>
  <line x1="940" y1="105" x2="930" y2="100" stroke="#E65100" stroke-width="2"/>
  <line x1="915" y1="95" x2="930" y2="85" stroke="#E65100" stroke-width="1.5"/>
  <line x1="945" y1="95" x2="930" y2="85" stroke="#E65100" stroke-width="1.5"/>

  <!-- Unused / Strapping pins note -->
  <text class="note-text" x="630" y="460">⚠ GPIO2/8/9: ストラッピングピン（未使用）</text>
  <text class="note-text" x="630" y="475">⚠ GPIO20 (D7): UART RX（デバッグ確保）</text>
  <text class="note-text" x="630" y="490">⚠ JTAG (GPIO4-7): SPI で占有</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Signal Lines -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- SPI SCK: GP18 → GPIO6 -->
  <line class="signal-line spi-line" x1="384" y1="152" x2="616" y2="152"/>
  <text x="500" y="147" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">SCK</text>

  <!-- SPI MOSI: GP19 → GPIO7 -->
  <line class="signal-line spi-line" x1="384" y1="177" x2="616" y2="177"/>
  <text x="500" y="172" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">MOSI</text>

  <!-- SPI MISO: GP16 ← GPIO5 -->
  <line class="signal-line spi-line" x1="384" y1="202" x2="616" y2="202"/>
  <text x="500" y="197" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">MISO</text>

  <!-- SPI CS: GP17 → GPIO10 -->
  <line class="signal-line spi-line" x1="384" y1="227" x2="616" y2="227"/>
  <text x="500" y="222" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">CS#</text>

  <!-- Handshake: GP15 ← GPIO3 -->
  <line class="signal-line ctrl-line" x1="384" y1="287" x2="616" y2="287" stroke-dasharray="8,4"/>
  <text x="500" y="282" text-anchor="middle" font-size="10" fill="#E65100" font-weight="bold">Handshake</text>

  <!-- Data Ready: GP13 ← GPIO4 -->
  <line class="signal-line ctrl-line" x1="384" y1="312" x2="616" y2="312" stroke-dasharray="8,4"/>
  <text x="500" y="307" text-anchor="middle" font-size="10" fill="#E65100" font-weight="bold">Data Ready</text>

  <!-- Reset: GP14 → GPIO21 -->
  <line class="signal-line ctrl-line" x1="384" y1="337" x2="616" y2="337" stroke-dasharray="8,4"/>
  <text x="500" y="332" text-anchor="middle" font-size="10" fill="#E65100" font-weight="bold">Reset#</text>

  <!-- 3V3 Power -->
  <line class="signal-line power-line" x1="384" y1="397" x2="616" y2="397" stroke-width="3"/>
  <text x="500" y="392" text-anchor="middle" font-size="10" fill="#C62828" font-weight="bold">3.3V</text>

  <!-- GND -->
  <line class="signal-line gnd-line" x1="384" y1="422" x2="616" y2="422" stroke-width="3"/>
  <text x="500" y="417" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">GND</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Sensor Boxes (Bottom) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- BME280 -->
  <rect class="sensor-box" x="50" y="530" width="160" height="70"/>
  <text x="130" y="555" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">BME280</text>
  <text x="130" y="570" text-anchor="middle" font-size="10" fill="#555">温湿度・気圧</text>
  <text x="130" y="585" text-anchor="middle" font-size="10" fill="#555">I2C: GP4(SDA) GP5(SCL)</text>

  <!-- MQ-3B -->
  <rect class="sensor-box" x="230" y="530" width="160" height="70"/>
  <text x="310" y="555" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">MQ-3B</text>
  <text x="310" y="570" text-anchor="middle" font-size="10" fill="#555">エタノールセンサー</text>
  <text x="310" y="585" text-anchor="middle" font-size="10" fill="#555">ADC: GP26 (ADC0)</text>

  <!-- DRV8835 -->
  <rect class="motor-box" x="410" y="530" width="160" height="70"/>
  <text x="490" y="555" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">DRV8835</text>
  <text x="490" y="570" text-anchor="middle" font-size="10" fill="#555">デュアルモータードライバ</text>
  <text x="490" y="585" text-anchor="middle" font-size="10" fill="#555">PWM: GP10, GP11</text>

  <!-- HC-SR04 -->
  <rect class="sensor-box" x="590" y="530" width="160" height="70"/>
  <text x="670" y="555" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">HC-SR04</text>
  <text x="670" y="570" text-anchor="middle" font-size="10" fill="#555">超音波センサー</text>
  <text x="670" y="585" text-anchor="middle" font-size="10" fill="#555">GPIO: GP2(Trig) GP3(Echo)</text>

  <!-- LEDs -->
  <rect class="sensor-box" x="770" y="530" width="160" height="70"/>
  <text x="850" y="555" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Status LEDs</text>
  <text x="850" y="570" text-anchor="middle" font-size="10" fill="#555">赤:GP20 橙:GP21 緑:GP22</text>
  <text x="850" y="585" text-anchor="middle" font-size="10" fill="#555">ステータス表示</text>

  <!-- Connection lines from RP2040 to sensors -->
  <line x1="130" y1="500" x2="130" y2="530" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="310" y1="500" x2="310" y2="530" stroke="#4CAF50" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Legend -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect class="legend-box" x="50" y="625" width="900" height="85"/>
  <text x="70" y="645" font-size="12" font-weight="bold" fill="#333">凡例</text>

  <line x1="70" y1="660" x2="120" y2="660" class="signal-line spi-line"/>
  <text x="130" y="664" font-size="11" fill="#555">SPI バス (Full-Duplex)</text>

  <line x1="290" y1="660" x2="340" y2="660" class="signal-line ctrl-line" stroke-dasharray="8,4"/>
  <text x="350" y="664" font-size="11" fill="#555">制御信号 (Handshake/DR/Reset)</text>

  <line x1="570" y1="660" x2="620" y2="660" class="signal-line power-line" stroke-width="3"/>
  <text x="630" y="664" font-size="11" fill="#555">電源 (3.3V)</text>

  <line x1="740" y1="660" x2="790" y2="660" class="signal-line gnd-line" stroke-width="3"/>
  <text x="800" y="664" font-size="11" fill="#555">GND</text>

  <text x="70" y="690" font-size="10" fill="#777">
    SPI Mode: 0 (CPOL=0, CPHA=0) • Clock: 10 MHz • Full-Duplex • embassy-net-esp-hosted v0.3
  </text>
  <text x="70" y="703" font-size="10" fill="#777">
    ESP32-C3: esp-hosted-mcu firmware (SPI slave) • RP2040: SPI master via embassy-rp async SPI0
  </text>
</svg>
