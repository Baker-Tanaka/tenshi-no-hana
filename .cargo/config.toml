[target.'cfg(all(target_arch = "arm", target_os = "none"))']
rustflags = [
  "-C",
  "linker=flip-link",
  "-C",
  "link-arg=--nmagic",
  "-C",
  "link-arg=-Tlink.x",
  "-C",
  "link-arg=-Tdefmt.x",
  # "-Z", "trap-unreachable=no",
  # Removed: "-C", "llvm-args=--inline-threshold=5"
  # This threshold prevents inlining in micropb-generated Rpc::decode() (64+ oneof match arms).
  # Without inlining, each decode_varint32/decode_tag call creates a separate stack frame,
  # overflowing the Cortex-M0+ stack and causing HardFault with VarIntLimit as a symptom.
  "-C",
  "no-vectorize-loops",
]

[build]
target = "thumbv6m-none-eabi"

[env]
DEFMT_LOG = "debug"

# Memory usage analysis shortcuts (requires cargo-binutils)
# cargo size-default  → Embassy LED demo (default feature)
# cargo size-wifi     → wifi_microros_sensors example
# cargo size-sensor   → sensor_read example
# cargo size-all      → wifi + sensor example (largest build)
# cargo nm-top        → top symbols by size (ROM hotspots)
[alias]
size-default = "size --release -- -B"
size-wifi = [
  "size",
  "--no-default-features",
  "--features",
  "wifi",
  "--example",
  "wifi_microros_sensors",
  "--release",
  "--",
  "-B",
]
size-sensor = [
  "size",
  "--no-default-features",
  "--features",
  "sensor",
  "--example",
  "sensor_read",
  "--release",
  "--",
  "-B",
]
size-all = [
  "size",
  "--no-default-features",
  "--features",
  "wifi,sensor",
  "--example",
  "wifi_microros_sensors",
  "--release",
  "--",
  "-B",
]
nm-top = "nm --release -- --print-size --size-sort --radix=d"
