[target.'cfg(all(target_arch = "arm", target_os = "none"))']
rustflags = [
  "-C",
  "linker=flip-link",
  "-C",
  "link-arg=--nmagic",
  "-C",
  "link-arg=-Tlink.x",
  "-C",
  "link-arg=-Tdefmt.x",
  # "-Z", "trap-unreachable=no",
  # Removed: "-C", "llvm-args=--inline-threshold=5"
  # This threshold prevents inlining in micropb-generated Rpc::decode() (64+ oneof match arms).
  # Without inlining, each decode_varint32/decode_tag call creates a separate stack frame,
  # overflowing the Cortex-M0+ stack and causing HardFault with VarIntLimit as a symptom.
  "-C",
  "no-vectorize-loops",
]

[build]
target = "thumbv6m-none-eabi"

[env]
DEFMT_LOG = "debug"
